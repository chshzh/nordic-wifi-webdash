#
# STA-only + webserver disabled
# Disables SoftAP, HTTP server, mDNS, and DNS-SD entirely.
# Use with overlay-sta-webserver.conf as the baseline for comparison.
#

# Disable SoftAP driver and supplicant support
CONFIG_NRF70_AP_MODE=n
CONFIG_WIFI_NM_WPA_SUPPLICANT_AP=n

# Disable SoftAP-only networking (DHCP server, static gateway IP)
CONFIG_NET_DHCPV4_SERVER=n
CONFIG_NET_CONFIG_SETTINGS=n

# Default to STA mode on first boot
CONFIG_ZEGO_WIFI_DEFAULT_MODE_SOFTAP=n
CONFIG_ZEGO_WIFI_DEFAULT_MODE_STA=y

# Disable webserver module (gates webserver.c compilation)
CONFIG_WEBSERVER_MODULE=n

# Disable Zephyr HTTP stack
CONFIG_HTTP_SERVER=n
CONFIG_HTTP_PARSER=n
CONFIG_HTTP_PARSER_URL=n

# Disable mDNS / DNS-SD (was only used by the webserver)
CONFIG_MDNS_RESPONDER=n
CONFIG_DNS_SD=n
CONFIG_MDNS_RESPONDER_DNS_SD=n
