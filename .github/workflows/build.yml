name: Build and Test Nordic WiFi Web Dashboard

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  set-version:
    runs-on: ubuntu-24.04
    outputs:
      NCS_VERSION: ${{ steps.extract-version.outputs.NCS_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: app-workspace/nordic-wifi-webdash

      - name: Extract NCS version from west.yml
        id: extract-version
        working-directory: app-workspace/nordic-wifi-webdash
        run: |
          NCS_VERSION=$(grep 'revision:' west.yml | awk '{print $2}')
          echo "NCS_VERSION=${NCS_VERSION}" >> $GITHUB_OUTPUT

  build-and-test:
    needs: set-version
    runs-on: ubuntu-24.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:${{ needs.set-version.outputs.NCS_VERSION }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        config:
          - name: "nRF7002DK"
            build_dir: "build_nrf7002dk"
            board: "nrf7002dk/nrf5340/cpuapp"
            cmake_args: ""
          - name: "nRF54LM20DK + nRF7002EBII"
            build_dir: "build_nrf54lm20"
            board: "nrf54lm20dk/nrf54lm20a/cpuapp"
            cmake_args: "-Dnordic_wifi_webdash_SHIELD=nrf7002eb2 -Dnordic_wifi_webdash_SNIPPET=nrf70-wifi"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: app-workspace/nordic-wifi-webdash

      - name: Prepare west workspace
        working-directory: app-workspace
        run: |
          west init -l nordic-wifi-webdash
          west update -o=--depth=1 -n

      - name: Build ${{ matrix.config.name }}
        working-directory: app-workspace/nordic-wifi-webdash
        run: |
          EXTRA_ARGS="${{ matrix.config.cmake_args }}"
          if [ -n "$EXTRA_ARGS" ]; then
            west build -p -b ${{ matrix.config.board }} -d ${{ matrix.config.build_dir }} -- $EXTRA_ARGS
          else
            west build -p -b ${{ matrix.config.board }} -d ${{ matrix.config.build_dir }}
          fi

      - name: Upload artifacts for ${{ matrix.config.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.build_dir }}
          path: |
            app-workspace/nordic-wifi-webdash/${{ matrix.config.build_dir }}/merged.hex

  validate-documentation:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: app-workspace/nordic-wifi-webdash

      - name: Validate README structure
        working-directory: app-workspace/nordic-wifi-webdash
        run: |
          echo "Validating README.md structure..."

          # Required sections for WiFi SoftAP Webserver
          grep -q "Features" README.md || (echo "Missing Features section" && exit 1)
          grep -q "Architecture" README.md || (echo "Missing Architecture section" && exit 1)
          grep -q "Quick Start" README.md || (echo "Missing Quick Start section" && exit 1)
          grep -q "WiFi Configuration" README.md || (echo "Missing WiFi Configuration section" && exit 1)
          grep -q "Web Interface" README.md || (echo "Missing Web Interface section" && exit 1)
          grep -q "REST API" README.md || (echo "Missing REST API section" && exit 1)

          echo "README.md validation passed ✓"

      - name: Validate configuration files exist
        working-directory: app-workspace/nordic-wifi-webdash
        run: |
          echo "Checking configuration files..."

          # Core configuration
          [ -f prj.conf ] || (echo "Missing prj.conf" && exit 1)
          [ -f west.yml ] || (echo "Missing west.yml" && exit 1)
          [ -f CMakeLists.txt ] || (echo "Missing CMakeLists.txt" && exit 1)
          [ -f Kconfig ] || (echo "Missing Kconfig" && exit 1)

          # Credential template
          [ -f overlay-wifi-credentials.conf.template ] || (echo "Missing credential template" && exit 1)

          echo "Configuration files validation passed ✓"

  static-analysis:
    needs: set-version
    runs-on: ubuntu-24.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:${{ needs.set-version.outputs.NCS_VERSION }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: app-workspace/nordic-wifi-webdash

      - name: Prepare west project
        working-directory: app-workspace
        run: |
          west init -l nordic-wifi-webdash
          west update -o=--depth=1 -n

      - name: Run Zephyr checkpatch
        working-directory: app-workspace
        run: |
          echo "Running Zephyr checkpatch on source files..."

          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            cd nordic-wifi-webdash && git diff HEAD~1 | ../zephyr/scripts/checkpatch.pl --no-tree -
          else
            echo "Single commit detected, checking all source files..."
            if [ -d nordic-wifi-webdash/src/ ]; then
              for file in $(find nordic-wifi-webdash/src/ -name "*.c" -o -name "*.h"); do
                if [ -f "$file" ]; then
                  echo "Checking $file..."
                  ./zephyr/scripts/checkpatch.pl --no-tree --file "$file" || true
                fi
              done
            fi
          fi

          echo "Checkpatch analysis completed ✓"

  create-release:
    needs: [set-version, build-and-test, validate-documentation, static-analysis]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: app-workspace/nordic-wifi-webdash

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: release-notes
        working-directory: app-workspace/nordic-wifi-webdash
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "First release - no previous tag found"
            CHANGELOG="Initial release of Nordic WiFi Web Dashboard"
          else
            echo "Generating changelog from $PREV_TAG to ${{ github.ref_name }}"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          # Save to file for multi-line handling
          echo "$CHANGELOG" > /tmp/changelog.txt

          # Create summary
          COMMIT_COUNT=$(git rev-list ${PREV_TAG}..HEAD --count 2>/dev/null || echo "0")
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Prepare release body
        run: |
          cat > /tmp/release-body.txt << 'EOF'
          ## Nordic WiFi Web Dashboard Release ${{ github.ref_name }}

          > **Note**: Built with NCS ${{ needs.set-version.outputs.NCS_VERSION }}

          ### 📦 Firmware Files

          | Board | File | Description |
          |-------|------|-------------|
          | nRF7002DK | [nordic-wifi-webdash-nrf7002dk-${{ github.ref_name }}.hex](https://github.com/chshzh/nordic-wifi-webdash/releases/download/${{ github.ref_name }}/nordic-wifi-webdash-nrf7002dk-${{ github.ref_name }}.hex) | nRF7002DK (nrf7002dk/nrf5340/cpuapp) |
          | nRF54LM20DK + nRF7002EBII | [nordic-wifi-webdash-nrf54lm20dk-nrf7002ebii-${{ github.ref_name }}.hex](https://github.com/chshzh/nordic-wifi-webdash/releases/download/${{ github.ref_name }}/nordic-wifi-webdash-nrf54lm20dk-nrf7002ebii-${{ github.ref_name }}.hex) | nRF54LM20DK with nRF7002EBII shield |

          ### 🚀 Quick Start

          **Step 1 — Flash the firmware**
          Open **nRF Connect for Desktop → Programmer**, select your board, add the `.hex` file above, and click **Write**.

          **Step 2 — Connect and open the dashboard**
          Open a serial terminal (115200 baud) to read the boot log, then follow the instructions printed there:
          - **SoftAP (default):** Connect your phone/laptop to Wi-Fi `WebDashboard_AP` (password `12345678`) and open `http://192.168.7.1`.
          - **STA:** Run `wifi_mode STA` in the shell, reboot, then run `wifi connect -s <SSID> -p <password> -k 1`. Open `http://<DHCP-IP>` shown in the log.
          - **P2P:** Run `wifi_mode P2P` and follow the Wi-Fi Direct pairing instructions in the terminal.

          > To switch modes at any time: `uart:~$ wifi_mode [SoftAP|STA|P2P]` — the board reboots and persists the choice.

          ### 📝 Changes Since Last Release

          EOF

          # Append changelog
          if [ -f /tmp/changelog.txt ]; then
            cat /tmp/changelog.txt >> /tmp/release-body.txt
          else
            echo "Initial release" >> /tmp/release-body.txt
          fi

      - name: Create release package
        run: |
          mkdir -p release-package

          # Copy and rename hex files
          if [ -f "artifacts/build-build_nrf7002dk/merged.hex" ]; then
            cp "artifacts/build-build_nrf7002dk/merged.hex" \
               "release-package/nordic-wifi-webdash-nrf7002dk-${{ github.ref_name }}.hex"
          fi

          if [ -f "artifacts/build-build_nrf54lm20/merged.hex" ]; then
            cp "artifacts/build-build_nrf54lm20/merged.hex" \
               "release-package/nordic-wifi-webdash-nrf54lm20dk-nrf7002ebii-${{ github.ref_name }}.hex"
          fi

          # Create zip archive
          cd release-package
          zip -r "../nordic-wifi-webdash-firmware-${{ github.ref_name }}.zip" .
          cd ..

          ls -la release-package/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Nordic WiFi Web Dashboard ${{ github.ref_name }}"
          body_path: /tmp/release-body.txt
          files: |
            release-package/*.hex
            nordic-wifi-webdash-firmware-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
