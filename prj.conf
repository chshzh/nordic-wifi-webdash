# ============================================================================
# Wi-Fi Configuration (SoftAP + STA; P2P requires -S wifi-p2p build)
# ============================================================================
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y

# WPA supplicant — supports both STA and SoftAP in the same binary
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_AP=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=8192
CONFIG_WIFI_NM_WPA_SUPPLICANT_WQ_STACK_SIZE=5632

# nRF70 SoftAP mode
CONFIG_NRF70_AP_MODE=y
CONFIG_NRF_WIFI_LOW_POWER=n

# ============================================================================
# Shell — required for mode selector UX and wifi_cred STA setup
# ============================================================================
CONFIG_SHELL=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_WIFI_SHELL_MAX_AP_STA=2
CONFIG_SHELL_STACK_SIZE=8192

# ============================================================================
# Networking
# ============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_IPV6=n

# DHCP Server (SoftAP)
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_DHCPV4_SERVER_ADDR_COUNT=2

# Static IP for SoftAP gateway
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.7.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.7.1"
CONFIG_NET_CONFIG_INIT_TIMEOUT=0

# ============================================================================
# STA mode — Connection Manager + Wi-Fi Credentials
# ============================================================================
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=5120
CONFIG_L2_WIFI_CONNECTIVITY=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_AUTO_INIT=y

# ============================================================================
# Mode Selector — NVS persistence (Flash / Settings / NVS)
# ============================================================================
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# ============================================================================
# Network buffers — tuned for performance
# ============================================================================
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=24
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NRF70_RX_NUM_BUFS=16
CONFIG_NET_TC_TX_COUNT=1
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=1
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_NET_MAX_CONN=16
CONFIG_NET_CONTEXT_SYNC_RECV=y
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_SOCKETS_POLL_MAX=10

# ============================================================================
# HTTP Server
# ============================================================================
CONFIG_HTTP_PARSER_URL=y
CONFIG_HTTP_PARSER=y
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_SERVER_MAX_CLIENTS=10
CONFIG_HTTP_SERVER_MAX_STREAMS=10

# ============================================================================
# mDNS / DNS-SD — enables http://nrfwifi.local
# ============================================================================
CONFIG_MDNS_RESPONDER=y
CONFIG_DNS_SD=y
CONFIG_MDNS_RESPONDER_DNS_SD=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME_UNIQUE=n
CONFIG_NET_HOSTNAME="nrfwifi"

# ============================================================================
# SMF + Zbus
# ============================================================================
CONFIG_SMF=y
CONFIG_SMF_INITIAL_TRANSITION=y
CONFIG_SMF_ANCESTOR_SUPPORT=y
CONFIG_ZBUS=y
CONFIG_ZBUS_PRIORITY_BOOST=y
CONFIG_ZBUS_RUNTIME_OBSERVERS=y
CONFIG_ZBUS_MSG_SUBSCRIBER=y

# ============================================================================
# GPIO / DK Library
# ============================================================================
CONFIG_GPIO=y
CONFIG_DK_LIBRARY=y

# ============================================================================
# JSON
# ============================================================================
CONFIG_JSON_LIBRARY=y

# ============================================================================
# Memory / Stack sizes (sized from thread analyzer high-water marks)
# ============================================================================
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
# With CONN_MGR_IF_NO_AUTO_CONNECT cleared for P2P, the RPU context stays
# alive after a P2P group failure.  The WPA supplicant then does a full
# interface_remove cleanup which runs in the net_mgmt event thread.
# 2048 bytes overflows; 4096 is sufficient for the WPA supplicant cleanup.
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_HTTP_SERVER_STACK_SIZE=2048
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=3072

# ============================================================================
# System
# ============================================================================
CONFIG_REBOOT=y

# ============================================================================
# Debugging
# ============================================================================
CONFIG_STACK_SENTINEL=y
CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_MIN=y
CONFIG_SHELL_CMDS_RESIZE=n

# ============================================================================
# Kernel options
# ============================================================================
CONFIG_ENTROPY_GENERATOR=y
CONFIG_INIT_STACKS=y

# ============================================================================
# Logging
# ============================================================================
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_MODE_DEFERRED=y

# ============================================================================
# Eventfd — WPA supplicant needs more than 2
# ============================================================================
CONFIG_EVENTFD=y
CONFIG_ZVFS_OPEN_MAX=48
CONFIG_ZVFS_EVENTFD_MAX=16
CONFIG_POSIX_API=y
CONFIG_FDTABLE=y

# ============================================================================
# Module log levels
# ============================================================================
CONFIG_MODE_SELECTOR_LOG_LEVEL_INF=y
CONFIG_BUTTON_MODULE_LOG_LEVEL_INF=y
CONFIG_LED_MODULE_LOG_LEVEL_INF=y
CONFIG_WIFI_MODULE_LOG_LEVEL_INF=y
CONFIG_WEBSERVER_MODULE_LOG_LEVEL_INF=y

# ============================================================================
# Heap tuning
# WPA supplicant and POSIX subsystems add ~46 KB via HEAP_MEM_POOL_ADD_SIZE_*.
# Keep the base heap at 80 KB so total managed heap is around 125 KB.
# ============================================================================
CONFIG_HEAP_MEM_POOL_SIZE=90000
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=n
CONFIG_NRF_WIFI_GLOBAL_HEAP=n

# C library
CONFIG_MINIMAL_LIBC=n
CONFIG_PICOLIBC=y
CONFIG_NEWLIB_LIBC=n
